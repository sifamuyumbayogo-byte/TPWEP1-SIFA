<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil Minimaliste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000; /* Noir */
            color: #ffffff; /* Blanc */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .logo span {
            color: #00ff66; /* Vert éclatant */
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #00ff66; /* Devient vert au survol */
        }

        main {
            max-width: 800px;
            margin-top: -10vh; /* Centre légèrement vers le haut pour l'esthétique */
        }

        h1 {
            font-size: 64px;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        h1 span {
            color: #00ff66;
            font-weight: 700;
        }

        p {
            font-size: 18px;
            color: #a0a0a0; /* Blanc estompé pour le contraste */
            max-width: 600px;
            line-height: 1.6;
        }

        footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #444444; /* Noir/Gris très sombre pour la discrétion */
            border-top: 1px solid #111111;
            padding-top: 20px;
        }

        footer span {
            color: #00ff66;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">STUDIO<span>.</span></div>
        <nav>
            <a href="#">Concept</a>
            <a href="#">Projets</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <h1>Créer l'avenir avec <span>simplicité</span>.</h1>
        <p>Bienvenue dans un espace épuré où le design rencontre la clarté. Nous croyons en des solutions durables, minimalistes et profondément ancrées dans l'essentiel.</p>
    </main>

    <footer>
        <p>&copy; 2026 Votre Marque. Tous droits réservés.</p>
        <p>Design <span>Vert, Blanc, Noir</span></p>
    </footer>

</body>
</html>
