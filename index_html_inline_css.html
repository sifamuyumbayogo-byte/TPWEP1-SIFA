<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>Cascading Style Sheet - CSS</title>
    </head>
    <body style="background-color: #d9d9f1;">
        <!-- Commencement de l'entete du document web -->
        <header 
            style="background-color: #7fffd4a9; 
            width: 80%; height: 200px; margin: 0 auto;">

        </header>

        <!-- Le contenaire principal du document web -->
         <main style="background-color: #ccc; 
            width: 80%; height: 500px; margin: 0 auto;">

         </main>

         <!-- Le pieds de page -->
        <footer style="width: 80%; 
            height: 100px; margin: 0 auto; 
            background-color: white;">

        </footer>


    </body>


</html>
