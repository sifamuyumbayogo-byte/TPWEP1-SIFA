<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <title>Cascading Style Sheet - CSS</title>
        <style>
            body{
                background-color: #d9d9f1;  
            }

            .entete_pge{
                background-color: #7fffd4a9;  
                height: 200px; 

            }

            main{
                background-color: #ccc; 
                height: 500px;
            }

            /* footer{
                height: 100px; 
                background-color: white;
            } */

            footer,main,.entete_pge{
                width: 80%;
                margin: 0 auto;
            }

        </style>
    </head>
    <body>
        <!-- Commencement de l'entete du document web -->
        <header class="entete_pge"></header>

        <!-- Le contenaire principal du document web -->
         <main></main>

         <!-- Le pieds de page -->
        <footer class="entete_pge"></footer>


    </body>


</html>
